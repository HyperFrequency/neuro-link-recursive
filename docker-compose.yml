services:
  neuro-link:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - ./00-raw:/data/00-raw
      - ./01-sorted:/data/01-sorted
      - ./02-KB-main:/data/02-KB-main
      - ./03-ontology-main:/data/03-ontology-main
      - ./04-KB-agents-workflows:/data/04-KB-agents-workflows
      - ./07-neuro-link-task:/data/07-neuro-link-task
      - ./08-code-docs:/data/08-code-docs
      - ./config:/data/config
      - ./state:/data/state
    env_file:
      - secrets/.env
    environment:
      NLR_ROOT: /data
      QDRANT_URL: http://qdrant:6333
      NEO4J_HTTP_URL: http://neo4j:7474
    command: ["neuro-link", "serve", "--port", "8080", "--token", "auto"]
    depends_on:
      - qdrant

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant-data:/qdrant/storage

  neo4j:
    image: neo4j:5
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/neurolink1234
    volumes:
      - neo4j-data:/data

volumes:
  qdrant-data:
  neo4j-data:
